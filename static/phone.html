<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>YOLO Elf Phone</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="camera-shell">
      <section class="camera-stage" aria-label="camera preview">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <img id="demoFrame" class="demo-frame" src="/static/demo-frame.svg" alt="" hidden />
        <canvas id="overlayCanvas"></canvas>
      </section>

      <section id="cameraIdle" class="camera-idle" aria-label="camera start">
        <button class="primary camera-start" type="button" data-start-camera>
          Start camera
        </button>
      </section>

      <header class="hud topbar">
        <div class="brand"><img src="/static/logo.svg" alt="YOLO Elf" /></div>
        <div class="topbar-actions">
          <div class="status-row">
            <span id="cameraStatus" class="chip warn">camera idle</span>
            <span id="socketStatus" class="chip warn">socket idle</span>
            <span id="detectStatus" class="chip warn">detection idle</span>
            <span id="adaptiveStatus" class="chip warn">adaptive idle</span>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
            <span data-theme-icon aria-hidden="true">D</span>
          </button>
        </div>
      </header>

      <section class="hud controls">
        <button id="startButton" class="primary" type="button" data-start-camera>
          Start camera
        </button>
        <button id="stopButton" type="button" disabled>Stop camera</button>
        <label class="control-field" for="fpsInput">
          FPS
          <input id="fpsInput" type="number" min="1" max="30" step="1" value="10" />
        </label>
        <label class="control-field" for="qualityInput">
          JPEG
          <input id="qualityInput" type="number" min="0.3" max="0.95" step="0.05" value="0.85" />
        </label>
      </section>

      <canvas id="captureCanvas" hidden></canvas>
    </main>
    <script type="module" src="/static/phone.js"></script>
  </body>
</html>
