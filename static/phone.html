<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>YOLO Elf Phone</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="camera-shell">
      <section class="camera-stage" aria-label="camera preview">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <img id="demoFrame" class="demo-frame" src="/static/demo-frame.svg" alt="" hidden />
        <canvas id="overlayCanvas"></canvas>
        <div id="focusReticle" class="focus-reticle" aria-hidden="true" hidden></div>
      </section>

      <header class="hud topbar">
        <div class="brand"><img src="/static/logo.svg" alt="YOLO Elf" /></div>
        <div class="topbar-actions">
          <div id="statusRow" class="status-row">
            <span id="cameraStatus" class="chip warn">camera idle</span>
            <span id="socketStatus" class="chip warn">socket idle</span>
            <span id="detectStatus" class="chip warn">detection idle</span>
            <span id="recordingStatus" class="chip warn">recording idle</span>
            <span id="adaptiveStatus" class="chip warn">adaptive idle</span>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
            <svg class="theme-icon theme-icon-sun" data-theme-icon-sun aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" data-theme-icon-moon aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 3a6 6 0 0 0 9 7.4A9 9 0 1 1 12 3Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="hud controls">
        <div class="camera-control-row">
          <button id="cameraToggleButton" class="primary" type="button">
            Start
          </button>
          <button
            id="recordButton"
            class="icon-button record-toggle"
            type="button"
            aria-label="Start recording"
            title="Start recording"
          >
            <svg class="control-icon record-icon-start" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="6"></circle>
            </svg>
            <svg class="control-icon record-icon-stop" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <rect x="8" y="8" width="8" height="8" rx="1"></rect>
            </svg>
          </button>
          <div id="storageModeGroup" class="segmented-control storage-mode" role="group" aria-label="Recording storage">
            <button type="button" data-storage-mode="remote" aria-pressed="false">Remote</button>
            <button type="button" data-storage-mode="local" aria-pressed="true">Local</button>
            <button type="button" data-storage-mode="both" aria-pressed="false">Both</button>
          </div>
          <button
            id="settingsToggleButton"
            class="icon-button settings-toggle"
            type="button"
            aria-label="Collapse settings"
            aria-controls="statusRow advancedControls"
            aria-expanded="true"
            title="Collapse settings"
          >
            <svg class="control-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="m6 15 6-6 6 6"></path>
            </svg>
          </button>
        </div>
        <div id="advancedControls" class="advanced-controls">
          <label class="control-field" for="fpsInput">
            FPS
            <input id="fpsInput" type="number" min="1" max="30" step="1" value="10" />
          </label>
          <label class="control-field" for="qualityInput">
            JPEG
            <input id="qualityInput" type="number" min="0.3" max="0.95" step="0.05" value="0.85" />
          </label>
          <div class="control-field">
            <span>Lens</span>
            <button id="lensToggleButton" class="compact-button" type="button" aria-label="Switch to front camera">
              Back
            </button>
          </div>
          <label class="control-field control-field-wide" for="zoomInput">
            Zoom
            <input id="zoomInput" class="range-input" type="range" min="1" max="1" step="0.1" value="1" disabled />
            <output id="zoomValue" for="zoomInput">1.0x</output>
          </label>
          <label class="control-field" for="shutterInput">
            Shutter
            <input id="shutterInput" type="number" placeholder="Auto" disabled />
          </label>
          <label class="control-field" for="isoInput">
            ISO
            <input id="isoInput" type="number" placeholder="Auto" disabled />
          </label>
        </div>
      </section>

      <canvas id="captureCanvas" hidden></canvas>
    </main>
    <script type="module" src="/static/phone.js?v=recording-2"></script>
  </body>
</html>
