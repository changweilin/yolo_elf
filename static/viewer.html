<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YOLO Elf Viewer</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/app.css?v=ui-4" />
  </head>
  <body>
    <main class="viewer-shell">
      <section class="viewer-stage" aria-label="detected stream">
        <img id="viewerImage" alt="Detection preview" />
        <canvas id="viewerOverlay"></canvas>
        <div id="emptyState" class="empty-state">Waiting for frames</div>
      </section>

      <header class="hud topbar">
        <div class="brand"><img src="/static/logo.svg" alt="YOLO Elf" /></div>
        <nav class="role-switch" aria-label="Mode">
          <a href="/recorder" aria-label="Recorder" title="Recorder">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </a>
          <a href="/viewer" aria-current="page" aria-label="Viewer" title="Viewer">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </a>
          <a href="/settings" aria-label="Settings" title="Settings">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </a>
        </nav>
        <div class="topbar-actions">
          <div class="status-row">
            <span id="viewerSocketStatus" class="chip warn">viewer idle</span>
            <span id="cameraLinkStatus" class="chip warn">phone idle</span>
            <span id="phoneStorageStatus" class="chip warn">phone storage idle</span>
            <span id="modelStatus" class="chip warn">model idle</span>
            <span id="storageStatus" class="chip warn">storage idle</span>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
            <svg class="theme-icon theme-icon-sun" data-theme-icon-sun aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" data-theme-icon-moon aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 3a6 6 0 0 0 9 7.4A9 9 0 1 1 12 3Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <aside class="viewer-panel">
        <div class="panel-header">
          <span class="panel-title">Stream metrics</span>
          <a href="/recorder" target="_blank" rel="noreferrer">
            <button type="button">Open recorder</button>
          </a>
        </div>
        <div class="panel-control">
          <span class="panel-control-label">辨識模式</span>
          <div id="modeGroup" class="segmented-control detect-mode" role="group" aria-label="辨識模式">
            <button type="button" data-detect-mode="fast" aria-pressed="true" title="快速辨識（較小模型，速度優先）">快速</button>
            <button type="button" data-detect-mode="accurate" aria-pressed="false" title="精準辨識（較大模型，準確優先）">精準</button>
          </div>
        </div>
        <div id="modelSwitchProgress" class="switch-progress" role="status" aria-live="polite">
          <span class="switch-label">切換模型中…</span>
          <div class="progress-track"><div id="modelSwitchFill" class="progress-fill"></div></div>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">Frame</div>
            <div id="frameMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Boxes</div>
            <div id="boxesMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Inference</div>
            <div id="inferenceMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Dropped</div>
            <div id="droppedMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Recordings</div>
            <div id="recordingMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Remote uploads</div>
            <div id="uploadMetric" class="metric-value">-</div>
          </div>
        </div>
        <div id="errorLine" class="error-line" hidden></div>
      </aside>
    </main>
    <script type="module" src="/static/viewer.js?v=file-detect-1"></script>
  </body>
</html>
