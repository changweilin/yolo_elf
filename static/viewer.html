<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YOLO Elf Viewer</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <section class="viewer-stage" aria-label="detected stream">
        <img id="viewerImage" alt="Detection preview" />
        <canvas id="viewerOverlay"></canvas>
        <div id="emptyState" class="empty-state">Waiting for frames</div>
      </section>

      <header class="hud topbar">
        <div class="brand"><img src="/static/logo.svg" alt="YOLO Elf" /></div>
        <div class="topbar-actions">
          <div class="status-row">
            <span id="viewerSocketStatus" class="chip warn">viewer idle</span>
            <span id="cameraLinkStatus" class="chip warn">phone idle</span>
            <span id="phoneStorageStatus" class="chip warn">phone storage idle</span>
            <span id="modelStatus" class="chip warn">model idle</span>
            <span id="storageStatus" class="chip warn">storage idle</span>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
            <svg class="theme-icon theme-icon-sun" data-theme-icon-sun aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" data-theme-icon-moon aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 3a6 6 0 0 0 9 7.4A9 9 0 1 1 12 3Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <aside class="viewer-panel">
        <div class="panel-header">
          <span class="panel-title">Stream metrics</span>
          <a href="/phone" target="_blank" rel="noreferrer">
            <button type="button">Open phone</button>
          </a>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <div class="metric-label">Frame</div>
            <div id="frameMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Boxes</div>
            <div id="boxesMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Inference</div>
            <div id="inferenceMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Dropped</div>
            <div id="droppedMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Recordings</div>
            <div id="recordingMetric" class="metric-value">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">Remote uploads</div>
            <div id="uploadMetric" class="metric-value">-</div>
          </div>
        </div>
        <div id="errorLine" class="error-line" hidden></div>
      </aside>
    </main>
    <script type="module" src="/static/viewer.js?v=phone-storage-1"></script>
  </body>
</html>
